<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <title>Quiz de Matemática - Hyrule</title>
        <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Press+Start+2P&display=swap" rel="stylesheet"/>
          <link rel="stylesheet" href="style.css" />
          </head>
          <body>
            <audio id="bgMusic" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<button id="btnMusic" onclick="toggleMusic()" style="
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 9999;
  background: rgba(10,6,0,0.85);
  border: 2px solid #c8a84b;
  color: #f0d06a;
  font-size: 1.2rem;
  width: 40px;
  height: 40px;
  cursor: pointer;
  border-radius: 2px;
">🔊</button>

            <!-- Cortina de transição -->
              <div id="curtain">
                  <div class="triforce" id="curtainIcon">▲<br>▲▲</div>
                    </div>

                      <!-- Link morrendo -->
                        <div id="link-death"></div>

                          <!-- LOBBY -->
                            <div class="screen active" id="screen-lobby">
                                <div class="bg"></div>
                                    <div class="bg-overlay"></div>
                                        <div class="content">
                                              <div class="triforce-logo">▲<br><span style="letter-spacing:1.2rem">▲▲</span></div>
                                                    <div class="game-title">QUIZ DE<br>MATEMÁTICA</div>
                                                          <div class="game-subtitle">A LENDA DE HYRULE</div>
                                                                <button class="btn-start" onclick="goTo('screen-lobby','screen-custom')">▶ COMEÇAR</button>
                                                                      <div class="press-hint">pressione começar para iniciar</div>
                                                                          </div>
                                                                            </div>

                                                                              <!-- CUSTOMIZAÇÃO -->
                                                                                <div class="screen" id="screen-custom">
                                                                                    <div class="bg"></div>
                                                                                        <div class="bg-overlay"></div>
                                                                                            <div class="content">
                                                                                                  <div class="panel">
                                                                                                          <div class="panel-title">✦ QUEM É O HERÓI? ✦</div>
                                                                                                                  <input class="name-input" id="playerName" type="text" maxlength="12" placeholder="SEU NOME..." oninput="checkReady()" />
                                                                                                                        </div>
                                                                                                                              <div class="panel">
                                                                                                                                      <div class="panel-title">✦ ESCOLHA SEU LINK ✦</div>
                                                                                                                                              <div class="color-label">QUAL A COR DA TÚNICA?</div>
                                                                                                                                                      <div class="color-options" id="colorOptions"></div>
                                                                                                                                                            </div>
                                                                                                                                                                  <button class="btn-confirm" id="btnConfirm" onclick="confirmCustom()" disabled>
                                                                                                                                                                          ⚔ INICIAR JORNADA
                                                                                                                                                                                </button>
                                                                                                                                                                                    </div>
                                                                                                                                                                                      </div>

                                                                                                                                                                                        <!-- MAPA DE FASES -->
                                                                                                                                                                                          <div class="screen" id="screen-map">
                                                                                                                                                                                              <div class="bg"></div>
                                                                                                                                                                                                  <div class="bg-overlay"></div>
                                                                                                                                                                                                      <div class="content">
                                                                                                                                                                                                            <div class="map-title">⚔ MAPA DE HYRULE ⚔</div>
                                                                                                                                                                                                                  <div class="map-greeting" id="mapGreeting"></div>
                                                                                                                                                                                                                        <div class="phases-row" id="phasesRow"></div>
                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                              </div>

                                                                                                                                                                                                                                <!-- JOGO -->
                                                                                                                                                                                                                                  <div class="screen" id="screen-game">
                                                                                                                                                                                                                                      <div class="bg"></div>
                                                                                                                                                                                                                                          <div class="bg-overlay"></div>
                                                                                                                                                                                                                                              <div class="game-wrap">
                                                                                                                                                                                                                                                    <div class="hud medieval-box">
                                                                                                                                                                                                                                                            <div class="hud-phase" id="hudPhase">FASE 1</div>
                                                                                                                                                                                                                                                                    <div class="hud-lives" id="hudLives"></div>
                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                <div class="question-panel medieval-box">
                                                                                                                                                                                                                                                                                        <div class="q-header">
                                                                                                                                                                                                                                                                                                  <div class="q-triforce">▲<br><span style="letter-spacing:0.4rem">▲▲</span></div>
                                                                                                                                                                                                                                                                                                            <div class="question-number" id="questionNumber">PERGUNTA 1 DE 5</div>
                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                            <div class="q-divider"></div>
                                                                                                                                                                                                                                                                                                                                    <div class="question-text" id="questionText"></div>
                                                                                                                                                                                                                                                                                                                                            <div class="options-grid" id="optionsGrid"></div>
                                                                                                                                                                                                                                                                                                                                                    <div class="feedback-msg" id="feedbackMsg"></div>
                                                                                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                  <!-- GAME OVER -->
                                                                                                                                                                                                                                                                                                                                                                    <div class="screen" id="screen-gameover">
                                                                                                                                                                                                                                                                                                                                                                        <div class="bg"></div>
                                                                                                                                                                                                                                                                                                                                                                            <div class="bg-overlay"></div>
                                                                                                                                                                                                                                                                                                                                                                                <div class="content">
                                                                                                                                                                                                                                                                                                                                                                                      <div class="gameover-title">GAME OVER</div>
                                                                                                                                                                                                                                                                                                                                                                                            <div class="gameover-msg" id="gameoverMsg"></div>
                                                                                                                                                                                                                                                                                                                                                                                                  <button class="btn-start" onclick="restartGame()">↺ TENTAR NOVAMENTE</button>
                                                                                                                                                                                                                                                                                                                                                                                                        <button class="btn-secondary" onclick="goTo('screen-gameover','screen-map')">◀ VOLTAR AO MAPA</button>
                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                              </div>

                                                                                                                                                                                                                                                                                                                                                                                                                <!-- VITÓRIA -->
                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="screen" id="screen-victory">
                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="bg"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="bg-overlay"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="content">
                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="victory-stars">✦ ★ ✦</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="victory-title">HYRULE SALVA!</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="score-display" id="scoreDisplay"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                      <button class="btn-start" onclick="goTo('screen-victory','screen-map')">◀ VOLTAR AO MAPA</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                            <button class="btn-secondary" onclick="restartGame()">↺ JOGAR NOVAMENTE</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <script src="script.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </html>
